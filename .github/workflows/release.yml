name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            out: wafi-linux-amd64
          - goos: linux
            goarch: arm64
            out: wafi-linux-arm64
          - goos: darwin
            goarch: amd64
            out: wafi-darwin-amd64
          - goos: darwin
            goarch: arm64
            out: wafi-darwin-arm64
          - goos: windows
            goarch: amd64
            out: wafi-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.out }} ./cmd/wafi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: dist/${{ matrix.out }}
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        working-directory: dist
        run: sha256sum wafi-* > checksums.txt
      - name: extract release notes
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Pull the first "## " section from CHANGELOG.md; fall back to
          # tag name if the file is missing or empty.
          if [ -f CHANGELOG.md ]; then
            awk '
              /^## / && seen { exit }
              /^## / { seen=1 }
              seen { print }
            ' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "# ${tag}" > release-notes.md
          fi
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/wafi-*
            dist/checksums.txt
          fail_on_unmatched_files: true
